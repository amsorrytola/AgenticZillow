<!-- @dsCard group="Colors" viewport="700x160" name="Surfaces & Borders" subtitle="Page, bands, dividers — and the one agentic gradient" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.grid{display:flex;gap:12px}
.sw{flex:1;height:104px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid var(--border-hairline)}
.n{font-size:12px;font-weight:600}.h{font-size:11px;font-variant-numeric:tabular-nums;color:var(--text-muted)}</style></head>
<body>
<div class="grid">
<div class="sw" style="background:var(--surface-page)"><span class="n">Page / Card</span><span class="h">#FFFFFF</span></div>
<div class="sw" style="background:var(--surface-band)"><span class="n">Band / Skeleton</span><span class="h">#F1F1F4</span></div>
<div class="sw" style="background:var(--surface-zebra)"><span class="n">Zebra</span><span class="h">#F7F7F8</span></div>
<div class="sw" style="background:#fff;border:1px solid var(--border-default)"><span class="n">Border</span><span class="h">#D1D1D6</span></div>
<div class="sw" style="background:var(--agentic-gradient);border:none;color:#fff"><span class="n">✦ Agentic</span><span class="h" style="color:rgba(255,255,255,.85)">#006AFF→#5B3FD9</span></div>
</div>
</body></html>
