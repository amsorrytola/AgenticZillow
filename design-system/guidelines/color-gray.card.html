<!-- @dsCard group="Colors" viewport="700x150" name="Text Grays" subtitle="Cool near-black ramp for text, from primary to disabled" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:0;border-radius:8px;overflow:hidden;box-shadow:var(--shadow-sm)}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.n{font-size:12px;font-weight:600}.h{font-size:11px;font-variant-numeric:tabular-nums;opacity:.85}</style></head>
<body>
<div class="row">
<div class="sw" style="background:var(--gray-900);color:#fff"><span class="n">Primary</span><span class="h">#2A2A33</span></div>
<div class="sw" style="background:var(--gray-700);color:#fff"><span class="n">Secondary</span><span class="h">#54545C</span></div>
<div class="sw" style="background:var(--gray-600);color:#fff"><span class="n">Muted</span><span class="h">#74747C</span></div>
<div class="sw" style="background:var(--gray-400);color:#fff"><span class="n">Disabled</span><span class="h">#A7A6AD</span></div>
<div class="sw" style="background:var(--navy-900);color:#fff"><span class="n">Deep Navy</span><span class="h">#0D1F3C</span></div>
</div>
</body></html>
