<!-- @dsCard group="Type" viewport="700x150" name="Price / Tabular Numerals" subtitle="The dominant card element — 22px bold with tabular figures" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);color:var(--text-primary)}
.r{display:flex;gap:40px;align-items:flex-end;font-variant-numeric:tabular-nums}
.lab{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);margin-bottom:6px}</style></head>
<body>
<div class="r">
<div><div class="lab">Card price · 22/700</div><div style="font-size:22px;line-height:26px;font-weight:700">$625,000</div></div>
<div><div class="lab">Rent</div><div style="font-size:22px;line-height:26px;font-weight:700">$2,400<span style="font-size:14px;font-weight:400;color:var(--text-secondary)">/mo</span></div></div>
<div><div class="lab">Detail price · 32/700</div><div style="font-size:32px;line-height:40px;font-weight:700">$682,300</div></div>
<div><div class="lab">Aligned figures</div><div style="font-size:18px;font-weight:600">1,840<br>2,150<br>988</div></div>
</div>
</body></html>
