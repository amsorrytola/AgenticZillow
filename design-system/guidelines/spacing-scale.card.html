<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base — 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.r{display:flex;align-items:flex-end;gap:18px}
.col{display:flex;flex-direction:column;align-items:center;gap:8px}
.bar{background:var(--blue-600);border-radius:3px;width:24px}
.n{font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums}</style></head>
<body>
<div class="r">
<div class="col"><div class="bar" style="height:4px"></div><span class="n">4</span></div>
<div class="col"><div class="bar" style="height:8px"></div><span class="n">8</span></div>
<div class="col"><div class="bar" style="height:12px"></div><span class="n">12</span></div>
<div class="col"><div class="bar" style="height:16px"></div><span class="n">16</span></div>
<div class="col"><div class="bar" style="height:20px"></div><span class="n">20</span></div>
<div class="col"><div class="bar" style="height:24px"></div><span class="n">24</span></div>
<div class="col"><div class="bar" style="height:32px"></div><span class="n">32</span></div>
<div class="col"><div class="bar" style="height:40px"></div><span class="n">40</span></div>
<div class="col"><div class="bar" style="height:48px"></div><span class="n">48</span></div>
<div class="col"><div class="bar" style="height:64px"></div><span class="n">64</span></div>
<div class="col"><div class="bar" style="height:80px"></div><span class="n">80</span></div>
<div class="col"><div class="bar" style="height:96px"></div><span class="n">96</span></div>
</div>
</body></html>
