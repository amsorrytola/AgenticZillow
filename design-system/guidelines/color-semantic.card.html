<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & Status" subtitle="For Sale, Pending, Coming Soon, Sold and error/price-cut" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:0;border-radius:8px;overflow:hidden;box-shadow:var(--shadow-sm)}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.n{font-size:12px;font-weight:600}.h{font-size:11px;font-variant-numeric:tabular-nums;opacity:.9}</style></head>
<body>
<div class="row">
<div class="sw" style="background:var(--success);color:#fff"><span class="n">For Sale</span><span class="h">#008060</span></div>
<div class="sw" style="background:var(--warning);color:#2A2A33"><span class="n">Pending</span><span class="h">#FFB100</span></div>
<div class="sw" style="background:var(--violet);color:#fff"><span class="n">Coming Soon</span><span class="h">#9059FF</span></div>
<div class="sw" style="background:var(--error);color:#fff"><span class="n">Error / Cut</span><span class="h">#D6005C</span></div>
<div class="sw" style="background:var(--tag-sold);color:#fff"><span class="n">Sold</span><span class="h">#74747C</span></div>
</div>
</body></html>
