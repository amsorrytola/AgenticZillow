<!-- @dsCard group="Spacing" viewport="700x170" name="Radius" subtitle="8px controls & cards · 12px modals · full pill" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.r{display:flex;gap:24px;align-items:flex-end}
.col{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:96px;height:72px;background:var(--blue-100);border:1px solid var(--blue-600)}
.n{font-size:12px;font-weight:600;color:var(--text-primary)}.s{font-size:11px;color:var(--text-muted)}</style></head>
<body>
<div class="r">
<div class="col"><div class="box" style="border-radius:8px"></div><span class="n">8px</span><span class="s">Buttons · cards · inputs</span></div>
<div class="col"><div class="box" style="border-radius:12px"></div><span class="n">12px</span><span class="s">Modals · dropdowns</span></div>
<div class="col"><div class="box" style="border-radius:9999px"></div><span class="n">Full</span><span class="s">Pills · price bubbles · avatars</span></div>
<div class="col"><div class="box" style="border-radius:8px 8px 0 0"></div><span class="n">8 8 0 0</span><span class="s">Card photo top</span></div>
</div>
</body></html>
