<!-- @dsCard group="Colors" viewport="700x150" name="Brand Blue" subtitle="Zillow Blue and its hover / active / tint ramp" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;gap:0;border-radius:8px;overflow:hidden;box-shadow:var(--shadow-sm)}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.n{font-size:12px;font-weight:600}.h{font-size:11px;font-variant-numeric:tabular-nums;opacity:.85}</style></head>
<body>
<div class="row">
<div class="sw" style="background:var(--blue-800);color:#fff"><span class="n">Active</span><span class="h">#004BB5</span></div>
<div class="sw" style="background:var(--blue-700);color:#fff"><span class="n">Hover</span><span class="h">#0055CC</span></div>
<div class="sw" style="background:var(--blue-600);color:#fff"><span class="n">Zillow Blue</span><span class="h">#006AFF</span></div>
<div class="sw" style="background:var(--blue-500);color:#fff"><span class="n">Accent</span><span class="h">#1277E1</span></div>
<div class="sw" style="background:var(--blue-100);color:var(--blue-700)"><span class="n">Tint</span><span class="h">#E8F0FE</span></div>
<div class="sw" style="background:var(--blue-50);color:var(--blue-700)"><span class="n">Wash</span><span class="h">#F0F6FF</span></div>
</div>
</body></html>
