<!-- @dsCard group="Components" viewport="700x440" name="Property Card & Map Pins" subtitle="The signature listing card and Zillow map price bubbles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>body{margin:0;padding:24px;background:var(--surface-zebra);font-family:var(--font-sans)}
.wrap{display:flex;gap:20px;align-items:flex-start}
.pins{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;padding-top:8px}
.lbl{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { PropertyCard, PriceBubble } = window.AgenticZillowDesignSystem_f8327a;
function Demo(){
  const [saved,setSaved] = React.useState(true);
  return (
    <div className="wrap">
      <div style={{width:300}}>
        <PropertyCard
          photo="https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=600&q=80"
          status="for-sale" price="$625,000"
          beds={4} baths={3} sqft="2,150" homeType="House"
          address="1234 Pearl St, Austin, TX 78701"
          photoCount="1/24" priceCut="$10,000 (Apr 12)"
          attribution="Listing provided by Lone Star Realty"
          saved={saved} onSave={()=>setSaved(!saved)}/>
      </div>
      <div>
        <div className="lbl">Map price bubbles</div>
        <div className="pins">
          <PriceBubble price="$625K"/>
          <PriceBubble price="$540K" state="viewed"/>
          <PriceBubble price="$710K" state="saved"/>
          <PriceBubble price="$489K" state="shortlisted"/>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
