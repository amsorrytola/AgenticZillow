<!-- @dsCard group="Components" viewport="700x240" name="Inputs & Filters" subtitle="Search input, select, checkbox and the hallmark filter pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.lbl{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);width:76px;flex:none}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Input, Select, Checkbox, FilterPill, Button } = window.AgenticZillowDesignSystem_f8327a;
const Search = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>;
function Demo(){
  const [q,setQ] = React.useState("Austin, TX");
  const [sort,setSort] = React.useState("Homes for You");
  const [ck,setCk] = React.useState(true);
  return (
    <div>
      <div className="row"><span className="lbl">Search</span>
        <div style={{width:340}}><Input size="lg" iconLeft={<Search/>} clearable value={q} onChange={e=>setQ(e.target.value)} onClear={()=>setQ("")} placeholder="Address, neighborhood, city, or ZIP"/></div>
      </div>
      <div className="row"><span className="lbl">Filters</span>
        <FilterPill label="For Sale"/>
        <FilterPill label="Price"/>
        <FilterPill label="Beds & Baths"/>
        <FilterPill label="Home Type" applied count={3}/>
        <Button variant="primary" size="sm">Save search</Button>
      </div>
      <div className="row"><span className="lbl">Select</span>
        <Select value={sort} onChange={setSort} options={["Homes for You","Price (High to Low)","Price (Low to High)","Newest","AI: Best match for me","AI: Best deal"]}/>
        <Checkbox checked={ck} onChange={()=>setCk(!ck)} label="Has 3D tour"/>
        <Checkbox checked={false} onChange={()=>{}} label="Waterfront"/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
